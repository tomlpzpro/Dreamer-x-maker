<!doctype html>
<html lang="fr">
  <head>
    <title>Une erreur est survenue (500)</title>
    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1, width=device-width">
    <meta name="robots" content="noindex, nofollow">
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      * { margin: 0; }

      body {
        background: #FAF7F2;
        color: #1a1a2e;
        display: grid;
        place-items: center;
        min-height: 100dvh;
        font-family: ui-sans-serif, system-ui, sans-serif;
        text-align: center;
        padding: 2rem;
      }

      main {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.5rem;
        max-width: 480px;
      }

      .brand { font-size: 2rem; font-weight: 700; }
      .brand .dreamer { color: #E8642A; }
      .brand .x       { color: #1a1a2e; }
      .brand .maker   { color: #2A9D8F; }

      .error-code {
        font-size: 7rem;
        font-weight: 900;
        line-height: 1;
        color: #2A9D8F;
        opacity: .15;
      }

      h1 { font-size: 1.5rem; font-weight: 700; margin-top: -3rem; }
      p { color: #666; font-size: .95rem; line-height: 1.6; }

      a.btn {
        display: inline-block;
        margin-top: .5rem;
        padding: .75rem 1.75rem;
        background: #E8642A;
        color: #fff;
        border-radius: 2rem;
        text-decoration: none;
        font-weight: 600;
      }
      a.btn:hover { opacity: .85; }
    </style>
  </head>
  <body>
    <main>
      <div class="brand">
        <span class="dreamer">Dreamer</span>
        <span class="x"> x </span>
        <span class="maker">Maker</span>
      </div>
      <div class="error-code">500</div>
      <h1>Oups, quelque chose s'est mal passé.</h1>
      <p>Une erreur inattendue est survenue de notre côté.<br>Nous faisons le nécessaire pour la corriger. Réessayez dans quelques instants.</p>
      <a href="/" class="btn">Retour à l'accueil</a>
    </main>
  </body>
</html>
